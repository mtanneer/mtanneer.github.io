<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator</title>
    <style>
        /* Basic styling for the articles */
        .article {
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        .article h2 {
            font-size: 1.5em;
        }
        .article p {
            font-size: 1em;
        }
        .article button {
            margin-top: 10px;
            margin-left: 10px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .article button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Latest News</h1>
    <div id="news-container">
        <!-- News articles will appear here -->
    </div>

    <script src="../js/news.js"></script>
</body>
</html>
